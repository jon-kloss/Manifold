name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy (core, no Tauri shell — headless runner)
        run: cargo clippy --workspace --exclude app -- -D warnings && cargo clippy -p app --no-default-features -- -D warnings
      - name: test
        run: cargo test --workspace --exclude app && cargo test -p app --no-default-features
      - name: tokens in sync
        run: cargo run -p app --no-default-features --bin gen-tokens && git diff --exit-code renderer/src/tokens

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: WebKitGTK
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev
      - name: build Tauri shell
        run: cargo build -p app --features shell

  renderer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: renderer/pnpm-lock.yaml
      - name: install
        working-directory: renderer
        run: pnpm install --frozen-lockfile
      - name: typecheck
        working-directory: renderer
        run: pnpm typecheck
      - name: build
        working-directory: renderer
        run: pnpm build
