name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy (core, no Tauri shell — headless runner)
        run: cargo clippy --workspace --exclude app -- -D warnings && cargo clippy -p app --no-default-features -- -D warnings
      - name: test
        run: cargo test --workspace --exclude app && cargo test -p app --no-default-features
      - name: tokens in sync
        run: cargo run -p app --no-default-features --bin gen-tokens && git diff --exit-code renderer/src/tokens
      - name: solver builds for wasm
        run: cargo check -p solver-wasm --target wasm32-unknown-unknown
      - name: wasm pkg in sync
        run: ./scripts/regen-wasm.sh check

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: WebKitGTK
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev
      - name: build Tauri shell
        run: cargo build -p app --features shell

  renderer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Windows checkouts are case-insensitive: two tracked paths differing only
      # in case collide there and break the exe build (bit us twice — BuildSheet
      # and ItemIcon). Catch it on the cheap Linux job instead.
      - name: no case-colliding paths
        run: |
          dupes=$(git ls-files | tr '[:upper:]' '[:lower:]' | sort | uniq -d)
          if [ -n "$dupes" ]; then
            echo "::error::case-insensitive path collisions:"; echo "$dupes"; exit 1
          fi
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: renderer/pnpm-lock.yaml
      - name: install
        working-directory: renderer
        run: pnpm install --frozen-lockfile
      - name: typecheck
        working-directory: renderer
        run: pnpm typecheck
      - name: icon manifest ↔ public/icons in sync
        run: node scripts/check-icon-manifest.mjs
      - name: build
        working-directory: renderer
        run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 40 # cold cargo build + 12 serial specs with 120-300s import waits
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: renderer/pnpm-lock.yaml
      - name: install
        working-directory: renderer
        run: pnpm install --frozen-lockfile
      - name: playwright version
        id: pw
        working-directory: renderer
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: "playwright-chromium-${{ runner.os }}-${{ steps.pw.outputs.version }}"
      - name: install chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: renderer
        run: pnpm exec playwright install --with-deps chromium
      - name: install chromium OS deps # browser cached; apt deps are not
        if: steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: renderer
        run: pnpm exec playwright install-deps chromium
      - name: prebuild dev-bridge # so the webServer 180s timeout never eats a cold compile
        run: cargo build -p app --no-default-features --bin dev-bridge
      - name: e2e
        working-directory: renderer
        run: pnpm exec playwright test --trace=retain-on-failure
      - name: upload traces/results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: renderer/test-results/
          retention-days: 7
