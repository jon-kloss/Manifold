name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Least privilege: CI only reads the repo. The release workflow (windows.yml)
# carries its own contents:write and never runs on pull_request, so fork PRs
# can never reach a writing token.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy (core, no Tauri shell — headless runner)
        run: cargo clippy --workspace --exclude app -- -D warnings && cargo clippy -p app --no-default-features -- -D warnings
      - name: test
        run: cargo test --workspace --exclude app && cargo test -p app --no-default-features
      - name: app native-feature tests (headless — sqlite+ureq, no Tauri/shell)
        # --no-default-features drops the sqlite+native-http tests (SQLite
        # reopen/persist/fault + the ai_rank ureq-provider suite); re-run them
        # with just those features on. Neither pulls Tauri, so it stays
        # headless-safe on the runner (no WebKitGTK).
        run: cargo test -p app --no-default-features --features sqlite,native-http
      - name: tokens in sync
        run: cargo run -p app --no-default-features --bin gen-tokens && git diff --exit-code renderer/src/tokens
      - name: solver builds for wasm
        run: cargo check -p solver-wasm --target wasm32-unknown-unknown
      - name: wasm pkg in sync
        run: ./scripts/regen-wasm.sh check

  # Web Phase 2: prove the core compiles AND runs on wasm32. The `web` crate
  # wraps `Session` over MemoryPlanStore (no rusqlite / ureq / tiny_http); the
  # node smoke actually executes hydrate + edit in wasm, not just builds it.
  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: persist builds without rusqlite
        run: cargo build -p persist --no-default-features
      - name: build web for wasm32
        run: cargo build -p web --target wasm32-unknown-unknown
      - name: web wasm pkg in sync # committed web-pkg must match crates/web (no compiler needed)
        run: ./scripts/regen-web-wasm.sh check
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          # Pin the wasm-pack binary (was `latest` — a network-resolved
          # download that can flake); v0.13.1 is a recent stable that runs
          # `wasm-pack test --node` for this crate.
          version: v0.13.1
      - name: web wasm smoke (node)
        working-directory: crates/web
        run: wasm-pack test --node

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: WebKitGTK
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev
      - name: build Tauri shell
        run: cargo build -p app --features shell

  renderer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Windows checkouts are case-insensitive: two tracked paths differing only
      # in case collide there and break the exe build (bit us twice — BuildSheet
      # and ItemIcon). Catch it on the cheap Linux job instead.
      - name: no case-colliding paths
        run: |
          dupes=$(git ls-files | tr '[:upper:]' '[:lower:]' | sort | uniq -d)
          if [ -n "$dupes" ]; then
            echo "::error::case-insensitive path collisions:"; echo "$dupes"; exit 1
          fi
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: renderer/pnpm-lock.yaml
      - name: install
        working-directory: renderer
        run: pnpm install --frozen-lockfile
      - name: typecheck
        working-directory: renderer
        run: pnpm typecheck
      - name: unit tests (vitest)
        working-directory: renderer
        run: pnpm test
      - name: icon manifest ↔ public/icons in sync
        run: node scripts/check-icon-manifest.mjs
      - name: build
        working-directory: renderer
        run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 40 # cold cargo build + 12 serial specs with 120-300s import waits
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: renderer/pnpm-lock.yaml
      - name: install
        working-directory: renderer
        run: pnpm install --frozen-lockfile
      - name: playwright version
        id: pw
        working-directory: renderer
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v6
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: "playwright-chromium-${{ runner.os }}-${{ steps.pw.outputs.version }}"
      - name: install chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: renderer
        run: pnpm exec playwright install --with-deps chromium
      - name: install chromium OS deps # browser cached; apt deps are not
        if: steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: renderer
        run: pnpm exec playwright install-deps chromium
      - name: prebuild dev-bridge # so the webServer 180s timeout never eats a cold compile
        run: cargo build -p app --no-default-features --features bridge --bin dev-bridge
      - name: e2e
        working-directory: renderer
        run: pnpm exec playwright test --trace=retain-on-failure
      - name: upload traces/results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: renderer/test-results/
          retention-days: 7

  # Web Phase 3: drive the BUILT web app (`build:web` → dist-web) in a real
  # browser — no dev bridge, no Tauri. This is the permanent gate the one-time
  # Phase-3 browser proof became: it boots the wasm Session in a Web Worker,
  # edits, RELOADS, and asserts the plan persisted through IndexedDB (M1 chat
  # draft survives; M2 corrupt blob boots fresh, not bricked). Separate from the
  # dev-bridge `e2e` job — own config, own dist, client-side only.
  web-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: renderer/pnpm-lock.yaml
      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          # Same pin as the `wasm` job — `latest` is a network-resolved download
          # that can flake; v0.13.1 is the stable that builds crates/web.
          version: v0.13.1
      - name: install
        working-directory: renderer
        run: pnpm install --frozen-lockfile
      - name: playwright version
        id: pw
        working-directory: renderer
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v6
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: "playwright-chromium-${{ runner.os }}-${{ steps.pw.outputs.version }}"
      - name: install chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        working-directory: renderer
        run: pnpm exec playwright install --with-deps chromium
      - name: install chromium OS deps # browser cached; apt deps are not
        if: steps.pw-cache.outputs.cache-hit == 'true'
        working-directory: renderer
        run: pnpm exec playwright install-deps chromium
      - name: build web app (wasm-pack + vite --mode web)
        working-directory: renderer
        run: pnpm build:web
      - name: browser smoke (boot + edit + persist across reload)
        working-directory: renderer
        run: pnpm exec playwright test --config playwright.web.config.ts --trace=retain-on-failure
      - name: upload traces/results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-smoke-traces
          path: renderer/test-results/
          retention-days: 7

  # Web Phase 4a: gate the Railway deploy artifact. Build the deploy image the
  # same way Railway will (deploy/Dockerfile, repo-root context), RUN it, and
  # curl the served bundle — index 200 + the wasm served as application/wasm.
  # This is the runtime proof of the Dockerfile + Caddyfile, not just that they
  # parse. The image builds from the committed web-pkg (no Rust toolchain).
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: build the deploy image
        run: docker build -f deploy/Dockerfile -t ficsit-web:ci .
      - name: run it and probe the served bundle
        run: |
          docker run -d --name web -e PORT=8080 -p 8080:8080 ficsit-web:ci
          # Wait for Caddy to answer (up to ~20s).
          for i in $(seq 1 20); do
            if curl -fsS -o /dev/null http://localhost:8080/; then break; fi
            sleep 1
          done
          echo "== index ==" && curl -fsS -o /dev/null -w "%{http_code}\n" http://localhost:8080/
          # Assert the MIME of the MAIN app wasm specifically (web_bg-*.wasm, the
          # 3.4MB module the worker instantiates) — not just any .wasm — since a
          # wrong Content-Type makes the browser refuse to instantiate it.
          wasm=$(docker exec web sh -c 'ls /srv/assets/web_bg-*.wasm' | head -1 | sed 's#/srv/##')
          echo "== wasm asset: $wasm =="
          ctype=$(curl -fsS -o /dev/null -D - "http://localhost:8080/$wasm" | tr -d '\r' | awk -F': ' 'tolower($1)=="content-type"{print tolower($2)}')
          echo "content-type: $ctype"
          case "$ctype" in
            application/wasm*) echo "OK: wasm served as application/wasm" ;;
            *) echo "::error::wasm not served as application/wasm (got: $ctype)"; docker logs web; exit 1 ;;
          esac
          # Vendored game icons must serve as real PNGs...
          ictype=$(curl -fsS -o /dev/null -D - "http://localhost:8080/icons/Build_SmelterMk1_C.png" | tr -d '\r' | awk -F': ' 'tolower($1)=="content-type"{print tolower($2)}')
          echo "== icon content-type: $ictype =="
          case "$ictype" in
            image/png*) echo "OK: icon served as image/png" ;;
            *) echo "::error::icon not served as image/png (got: $ictype)"; docker logs web; exit 1 ;;
          esac
          # ...and a MISSING asset path must 404, not fall back to index.html:
          # a 200-HTML answer for an icon gets heuristically cached by browsers
          # and benches every icon until a hard refresh (2026-07-19 incident).
          code=$(curl -sS -o /dev/null -w "%{http_code}" http://localhost:8080/icons/DoesNotExist_C.png)
          echo "== missing-asset status: $code =="
          if [ "$code" != "404" ]; then
            echo "::error::missing asset path returned $code (expected 404 — SPA fallback must not swallow asset paths)"; docker logs web; exit 1
          fi
      - name: stop
        if: always()
        run: docker rm -f web || true
